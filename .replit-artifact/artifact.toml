kind = "web"
previewPath = "/"
title = "Bar Cafetería Los Espejitos"
version = "1.0.0"
id = "artifacts/los-espejitos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23053

[services.development]
run = "pnpm --filter @workspace/los-espejitos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/los-espejitos", "run", "build" ]
publicDir = "artifacts/los-espejitos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23053"
BASE_PATH = "/"
